<title>Z90 Method</title>
<script>
(function () {
  // Strip invisible Unicode marks (RTL/LTR/zero-width) that some keyboards
  // append to a typed URL, then redirect to the clean path if it changed.
  try {
    var junk = /[​-‏‪-‮⁦-⁩﻿]/g;
    var path = decodeURIComponent(location.pathname).replace(junk, '');
    // also drop a stray trailing slash on file-style paths
    var cleanPath = path;
    if (cleanPath !== decodeURIComponent(location.pathname)) {
      location.replace(location.origin + encodeURI(cleanPath) + location.search + location.hash);
    }
  } catch (e) {}
})();
</script>
